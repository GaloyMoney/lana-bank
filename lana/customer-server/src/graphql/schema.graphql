scalar AnnualRatePct

scalar CVLPct

type CancelledWithdrawalEntry {
	recordedAt: Timestamp!
	withdrawal: Withdrawal!
}

type Collateral {
	btcBalance: Satoshis!
}

enum CollateralDirection {
	ADD
	REMOVE
}

enum CollateralizationState {
	FULLY_COLLATERALIZED
	UNDER_MARGIN_CALL_THRESHOLD
	UNDER_LIQUIDATION_THRESHOLD
	NO_COLLATERAL
	NO_EXPOSURE
}

type CreditFacility {
	id: ID!
	creditFacilityId: UUID!
	facilityAmount: UsdCents!
	collateralizationState: CollateralizationState!
	status: CreditFacilityStatus!
	activatedAt: Timestamp!
	maturesAt: Timestamp!
	creditFacilityTerms: TermValues!
	balance: CreditFacilityBalance!
	currentCvl: CVLPct!
	history: [CreditFacilityHistoryEntry!]!
	disbursals: [CreditFacilityDisbursal!]!
	repaymentPlan: [CreditFacilityRepaymentPlanEntry!]!
}

type CreditFacilityApproved {
	cents: UsdCents!
	recordedAt: Timestamp!
	effective: Date!
	txId: UUID!
}

type CreditFacilityBalance {
	facilityRemaining: FacilityRemaining!
	disbursed: Disbursed!
	interest: Interest!
	outstanding: Outstanding!
	dueOutstanding: Outstanding!
	collateral: Collateral!
}

type CreditFacilityCollateralSentOut {
	amount: Satoshis!
	recordedAt: Timestamp!
	effective: Date!
	txId: UUID!
}

type CreditFacilityCollateralUpdated {
	satoshis: Satoshis!
	recordedAt: Timestamp!
	effective: Date!
	direction: CollateralDirection!
	txId: UUID!
}

type CreditFacilityCollateralizationUpdated {
	state: CollateralizationState!
	collateral: Satoshis!
	outstandingInterest: UsdCents!
	outstandingDisbursal: UsdCents!
	recordedAt: Timestamp!
	effective: Date!
	price: UsdCents!
}

type CreditFacilityDisbursal {
	id: ID!
	creditFacilityDisbursalId: UUID!
	amount: UsdCents!
	status: DisbursalStatus!
	createdAt: Timestamp!
}

type CreditFacilityDisbursalExecuted {
	cents: UsdCents!
	recordedAt: Timestamp!
	effective: Date!
	txId: UUID!
}

union CreditFacilityHistoryEntry = CreditFacilityIncrementalPayment | CreditFacilityCollateralUpdated | CreditFacilityApproved | PendingCreditFacilityCollateralizationUpdated | CreditFacilityCollateralizationUpdated | CreditFacilityDisbursalExecuted | CreditFacilityInterestAccrued | CreditFacilityCollateralSentOut | CreditFacilityRepaymentAmountReceived

type CreditFacilityIncrementalPayment {
	cents: UsdCents!
	recordedAt: Timestamp!
	effective: Date!
	txId: UUID!
}

type CreditFacilityInterestAccrued {
	cents: UsdCents!
	recordedAt: Timestamp!
	effective: Date!
	txId: UUID!
	days: Int!
}

type CreditFacilityPaymentAllocation {
	id: ID!
	creditFacilityPaymentAllocationId: UUID!
	amount: UsdCents!
	createdAt: Timestamp!
	creditFacility: CreditFacility!
}

type CreditFacilityRepaymentAmountReceived {
	cents: UsdCents!
	recordedAt: Timestamp!
	effective: Date!
	txId: UUID!
}

type CreditFacilityRepaymentPlanEntry {
	repaymentType: CreditFacilityRepaymentType!
	status: CreditFacilityRepaymentStatus!
	initial: UsdCents!
	outstanding: UsdCents!
	accrualAt: Timestamp!
	dueAt: Timestamp!
}

enum CreditFacilityRepaymentStatus {
	UPCOMING
	NOT_YET_DUE
	DUE
	OVERDUE
	DEFAULTED
	PAID
}

enum CreditFacilityRepaymentType {
	DISBURSAL
	INTEREST
}

enum CreditFacilityStatus {
	ACTIVE
	MATURED
	CLOSED
}

"""
The authenticated customer record.
"""
type Customer {
	"""
	Relay global identifier for this customer.
	"""
	id: ID!
	"""
	Internal UUID for this customer.
	"""
	customerId: UUID!
	"""
	Current lifecycle status of the customer.
	"""
	status: CustomerStatus!
	"""
	Current KYC level for the customer.
	"""
	level: KycLevel!
	"""
	When the customer record was created.
	"""
	createdAt: Timestamp!
	"""
	Email address associated with the customer.
	"""
	email: String!
	"""
	Telegram handle associated with the customer.
	"""
	telegramHandle: String!
	"""
	Operational customer type for this customer.
	"""
	customerType: CustomerType!
	"""
	Personal information collected for this customer, if available.
	"""
	personalInfo: PersonalInfo
	"""
	The most recently created deposit account available to this customer.
	"""
	depositAccount: DepositAccount!
	"""
	Credit facilities visible to this customer, newest first.
	"""
	creditFacilities: [CreditFacility!]!
}

enum CustomerStatus {
	ACTIVE
	FROZEN
	CLOSED
}

enum CustomerType {
	INDIVIDUAL
	GOVERNMENT_ENTITY
	PRIVATE_COMPANY
	BANK
	FINANCIAL_INSTITUTION
	FOREIGN_AGENCY_OR_SUBSIDIARY
	NON_DOMICILED_COMPANY
}

"""
An ISO 8601 calendar date without time or timezone (e.g., 2024-01-15). Represents a business date; timezone-naive by design.
"""
scalar Date

type Deposit {
	id: ID!
	depositId: UUID!
	accountId: UUID!
	amount: UsdCents!
	createdAt: Timestamp!
	reference: String!
	status: DepositStatus!
}

"""
A deposit account visible to the authenticated customer.
"""
type DepositAccount {
	"""
	Relay global identifier for this deposit account.
	"""
	id: ID!
	"""
	Internal UUID for this deposit account.
	"""
	depositAccountId: UUID!
	"""
	Internal UUID of the customer that owns this account.
	"""
	customerId: UUID!
	"""
	When the deposit account was created.
	"""
	createdAt: Timestamp!
	"""
	Current USD balance for this account.
	"""
	balance: DepositAccountBalance!
	"""
	Deposits recorded against this account.
	"""
	deposits: [Deposit!]!
	"""
	Withdrawals recorded against this account.
	"""
	withdrawals: [Withdrawal!]!
	"""
	Paginated account history, including deposits, withdrawals, and freeze events.
	"""
	history(first: Int!, after: String): DepositAccountHistoryEntryConnection!
}

"""
Current USD balances for a deposit account.
"""
type DepositAccountBalance {
	"""
	Funds that are fully settled and available on the account.
	"""
	settled: UsdCents!
	"""
	Funds that are pending settlement on the account.
	"""
	pending: UsdCents!
}

union DepositAccountHistoryEntry = DepositEntry | WithdrawalEntry | CancelledWithdrawalEntry | DisbursalEntry | PaymentEntry | FreezeEntry | UnfreezeEntry | UnknownEntry

type DepositAccountHistoryEntryConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [DepositAccountHistoryEntryEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [DepositAccountHistoryEntry!]!
}

"""
An edge in a connection.
"""
type DepositAccountHistoryEntryEdge {
	"""
	The item at the end of the edge
	"""
	node: DepositAccountHistoryEntry!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

type DepositEntry {
	recordedAt: Timestamp!
	deposit: Deposit!
}

enum DepositStatus {
	CONFIRMED
	REVERTED
}

type DisbursalEntry {
	recordedAt: Timestamp!
	disbursal: CreditFacilityDisbursal!
}

enum DisbursalStatus {
	NEW
	APPROVED
	DENIED
	CONFIRMED
}

type Disbursed {
	total: Total!
	outstanding: Outstanding!
	dueOutstanding: Outstanding!
}

type Duration {
	period: Period!
	units: Int!
}

type FacilityRemaining {
	usdBalance: UsdCents!
}

type FreezeEntry {
	txId: UUID!
	recordedAt: Timestamp!
	amount: UsdCents!
}

type Interest {
	total: Total!
	outstanding: Outstanding!
	dueOutstanding: Outstanding!
}

enum InterestInterval {
	END_OF_MONTH
	END_OF_DAY
}

enum KycLevel {
	NOT_KYCED
	BASIC
	ADVANCED
}

type Me {
	customer: Customer!
}

scalar OneTimeFeeRatePct

type Outstanding {
	usdBalance: UsdCents!
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type PaymentEntry {
	recordedAt: Timestamp!
	payment: CreditFacilityPaymentAllocation!
}

enum PendingCreditFacilityCollateralizationState {
	FULLY_COLLATERALIZED
	UNDER_COLLATERALIZED
	NOT_YET_COLLATERALIZED
}

type PendingCreditFacilityCollateralizationUpdated {
	state: PendingCreditFacilityCollateralizationState!
	collateral: Satoshis!
	price: UsdCents!
	recordedAt: Timestamp!
	effective: Date!
}

enum Period {
	MONTHS
}

type PersonalInfo {
	firstName: String!
	lastName: String!
	dateOfBirth: String
	nationality: String
	address: String
	companyName: String
}

type Query {
	"""
	Returns the currently authenticated customer.
	"""
	me: Me!
	"""
	Returns a credit facility by its internal UUID.
	"""
	creditFacility(
		"""
		Internal credit facility UUID.
		"""
		id: UUID!
	): CreditFacility
	"""
	Returns the latest BTC price visible to customer clients.
	"""
	realtimePrice: RealtimePrice!
}

"""
The latest BTC price visible to customer clients.
"""
type RealtimePrice {
	"""
	Price of one BTC in USD cents.
	"""
	usdCentsPerBtc: UsdCents!
}

scalar Satoshis

type TermValues {
	annualRate: AnnualRatePct!
	accrualInterval: InterestInterval!
	accrualCycleInterval: InterestInterval!
	oneTimeFeeRate: OneTimeFeeRatePct!
	duration: Duration!
	liquidationCvl: CVLPct!
	marginCallCvl: CVLPct!
	initialCvl: CVLPct!
}

"""
An ISO 8601 UTC timestamp (e.g., 2024-01-15T09:30:00Z). Always in UTC.
"""
scalar Timestamp

type Total {
	usdBalance: UsdCents!
}

scalar UUID

type UnfreezeEntry {
	txId: UUID!
	recordedAt: Timestamp!
	amount: UsdCents!
}

type UnknownEntry {
	txId: UUID!
	recordedAt: Timestamp!
}

scalar UsdCents

type Withdrawal {
	id: ID!
	withdrawalId: UUID!
	accountId: UUID!
	amount: UsdCents!
	status: WithdrawalStatus!
	createdAt: Timestamp!
	reference: String!
}

type WithdrawalEntry {
	recordedAt: Timestamp!
	withdrawal: Withdrawal!
}

enum WithdrawalStatus {
	PENDING_APPROVAL
	PENDING_CONFIRMATION
	CONFIRMED
	DENIED
	CANCELLED
	REVERTED
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
}
