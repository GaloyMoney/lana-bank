[test-groups]
# core-price and core-credit tests share a PostgreSQL database and the
# ephemeral_outbox_events NOTIFY channel.  When they run in parallel the
# credit test's seed_price (hardcoded 7_000_000) leaks into the price
# test's listener and overwrites its watch channel, causing flaky failures.
ephemeral-price-events = { max-threads = 1 }

# All other packages that use `obix::test_utils::expect_event` share the same
# PostgreSQL database and job tables.  Tests that call `jobs.start_poll()` each
# start a background poller competing for the `jobs`/`job_executions` tables.
# Too many concurrent pollers delays event production past the 20 s timeout in
# `expect_event`, causing rotating flaky failures.
#
# Combined with ephemeral-price-events (max-threads = 1) the total concurrent
# outbox-dependent tests is capped at 1 + 3 = 4.
outbox-events = { max-threads = 3 }

[[profile.default.overrides]]
filter = 'package(core-price) | package(core-credit)'
test-group = 'ephemeral-price-events'

[[profile.default.overrides]]
filter = """
  package(core-deposit)
  | package(core-credit-collection)
  | package(core-customer)
  | package(core-custody)
  | package(governance)
  | package(core-access)
  | package(core-report)
"""
test-group = 'outbox-events'
