<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagre Graph Visualization</title>
    <style>
        /* Basic reset */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevent scrollbars on body */
            font-family: sans-serif;
        }

        /* Make SVG container fill the screen */
        svg#dag-canvas {
            width: 100%;
            height: 100%;
            display: block;
            /* Prevents extra space below */
        }

        /* Node and Edge styling (unchanged) */
        .node rect {
            fill: #fff;
            stroke: #333;
            stroke-width: 1.5px;
        }

        .edgePath path {
            stroke: #333;
            stroke-width: 1.5px;
            fill: none;
        }

        .node text {
            font-family: sans-serif;
            font-size: 12px;
        }

        /* Optional: Style for h1 if needed */
        h1 {
            position: absolute;
            /* Position over the graph */
            top: 10px;
            left: 10px;
            margin: 0;
            padding: 5px;
            background: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            z-index: 10;
            /* Ensure it's above the SVG */
        }

        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 3px;
            z-index: 10;
        }

        #controls label,
        #controls input,
        #controls button {
            margin-left: 5px;
        }

        #controls input {
            width: 50px;
        }
    </style>
</head>

<body>
    <div id="controls">
        <label for="depth-input">Max Layers:</label>
        <input type="number" id="depth-input" value="Infinity" min="1" step="1">
        <button id="update-button">Update View</button>
    </div>
    <h1>Account Hierarchy DAG</h1>
    <svg id="dag-canvas"></svg>

    <!-- Load D3 library -->
    <script src="node_modules/d3/dist/d3.min.js"></script>
    <!-- Load dagre library -->
    <script src="node_modules/@dagrejs/dagre/dist/dagre.min.js"></script>
    <!-- Load dagre-d3 renderer -->
    <script src="node_modules/dagre-d3/dist/dagre-d3.min.js"></script>

    <!-- Load your graph definition script -->
    <script src="dag-graph.js"></script>

</body>

</html>
