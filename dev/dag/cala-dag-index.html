<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cala Account/Set DAG</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        #controls {
            padding: 10px;
            background-color: #f0f0f0;
            border-bottom: 1px solid #ccc;
            flex-shrink: 0;
            /* Prevent controls from shrinking */
        }

        #controls label {
            margin-right: 5px;
        }

        #controls input {
            margin-right: 10px;
            padding: 5px;
        }

        #controls button {
            padding: 5px 10px;
        }

        #graph-container {
            flex-grow: 1;
            /* Allow graph container to fill remaining space */
            width: 100%;
            height: 100%;
            /* Ensure SVG takes full container height */
            border: 1px solid #ccc;
            box-sizing: border-box;
            /* Include border in size */
        }

        svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .node rect {
            stroke: #333;
            fill: #fff;
            stroke-width: 1.5px;
        }

        .node.account rect {
            /* Style account nodes */
            fill: #e8f0ff;
            /* Light blue */
            stroke: #669cff;
        }

        .node.account_set rect {
            /* Style account set nodes */
            fill: #fff8e1;
            /* Light yellow */
            stroke: #ffc107;
        }

        .edgePath path {
            stroke: #333;
            stroke-width: 1.5px;
            fill: none;
        }

        text {
            font-weight: 300;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serf;
            font-size: 14px;
        }
    </style>
    <!-- Load D3, Dagre, and Dagre-D3 (use CDN or local paths) -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/dagre-d3@0.6.4/dist/dagre-d3.min.js"></script>
</head>

<body>
    <div id="controls">
        <label for="depth-input">Max Depth:</label>
        <input type="number" id="depth-input" min="1">
        <button id="update-button">Update Graph</button>
        <span>(Use 'Infinity' or leave blank to show all)</span>
    </div>
    <div id="graph-container">
        <svg id="cala-dag-canvas"></svg> <!-- Use a new ID -->
    </div>

    <script src="cala-dag-graph.js"></script> <!-- Reference the new JS -->
</body>

</html>
