anyhow = { workspace = true }
comfy-table = { workspace = true }
url = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
rustls = { workspace = true }
chrono = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
uuid = { workspace = true }
