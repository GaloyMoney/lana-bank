mutation CreditFacilityProposalCreate($input: CreditFacilityProposalCreateInput!) {
  creditFacilityProposalCreate(input: $input) {
    creditFacilityProposal {
      creditFacilityProposalId
      approvalProcessId
      status
      facilityAmount
      createdAt
      creditFacilityTerms {
        annualRate
        oneTimeFeeRate
        disbursalPolicy
        duration {
          period
          units
        }
      }
    }
  }
}

query CreditFacilityProposalsList($first: Int!, $after: String) {
  creditFacilityProposals(first: $first, after: $after) {
    nodes {
      creditFacilityProposalId
      status
      facilityAmount
      createdAt
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query CreditFacilitiesList($first: Int!, $after: String) {
  creditFacilities(first: $first, after: $after) {
    nodes {
      creditFacilityId
      publicId
      status
      facilityAmount
      collateralizationState
      activatedAt
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query CreditFacilityGet($id: UUID!) {
  creditFacility(id: $id) {
    creditFacilityId
    publicId
    status
    facilityAmount
    collateralizationState
    maturesAt
    activatedAt
    creditFacilityTerms {
      annualRate
      oneTimeFeeRate
      disbursalPolicy
      duration {
        period
        units
      }
    }
  }
}

mutation CreditFacilityDisbursalInitiate($input: CreditFacilityDisbursalInitiateInput!) {
  creditFacilityDisbursalInitiate(input: $input) {
    disbursal {
      creditFacilityDisbursalId
      amount
      status
      createdAt
      publicId
      creditFacility {
        creditFacilityId
      }
      approvalProcess {
        approvalProcessId
      }
    }
  }
}

query CreditFacilityProposalGet($id: UUID!) {
  creditFacilityProposal(id: $id) {
    creditFacilityProposalId
    approvalProcessId
    status
  }
}

mutation CreditFacilityProposalCustomerApprovalConclude($input: CreditFacilityProposalCustomerApprovalConcludeInput!) {
  creditFacilityProposalCustomerApprovalConclude(input: $input) {
    creditFacilityProposal {
      creditFacilityProposalId
      approvalProcessId
      status
    }
  }
}

query PendingCreditFacilityGet($id: UUID!) {
  pendingCreditFacility(id: $id) {
    pendingCreditFacilityId
    collateralId
    approvalProcessId
    status
    createdAt
    facilityAmount
    collateralizationState
    wallet {
      address
    }
    collateral {
      btcBalance
    }
  }
}

query CreditFacilityFind($id: UUID!) {
  creditFacility(id: $id) {
    creditFacilityId
    collateralId
    status
    maturesAt
    collateralizationState
    facilityAmount
    disbursals {
      creditFacilityDisbursalId
      status
    }
    history {
      __typename
      ... on CreditFacilityInterestAccrued {
        cents
        recordedAt
        txId
        days
      }
      ... on CreditFacilityCollateralizationUpdated {
        state
      }
    }
    balance {
      facilityRemaining {
        usdBalance
      }
      outstanding {
        usdBalance
      }
      collateral {
        btcBalance
      }
      disbursed {
        total {
          usdBalance
        }
        outstanding {
          usdBalance
        }
      }
      interest {
        total {
          usdBalance
        }
        outstanding {
          usdBalance
        }
      }
      paymentsUnapplied {
        usdBalance
      }
    }
    liquidations {
      liquidationId
    }
  }
}

mutation CreditFacilityPartialPaymentRecord($input: CreditFacilityPartialPaymentRecordInput!) {
  creditFacilityPartialPaymentRecord(input: $input) {
    creditFacility {
      creditFacilityId
      facilityAmount
      balance {
        facilityRemaining {
          usdBalance
        }
        outstanding {
          usdBalance
        }
        collateral {
          btcBalance
        }
        disbursed {
          total {
            usdBalance
          }
          outstanding {
            usdBalance
          }
        }
        interest {
          total {
            usdBalance
          }
          outstanding {
            usdBalance
          }
        }
        paymentsUnapplied {
          usdBalance
        }
      }
    }
  }
}
