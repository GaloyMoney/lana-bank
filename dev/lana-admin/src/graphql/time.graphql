query TimeGet {
  time {
    currentDate
    currentTime
    nextEndOfDayAt
    timezone
    endOfDayTime
    canAdvanceToNextEndOfDay
  }
}

mutation TimeAdvanceToNextEndOfDay {
  timeAdvanceToNextEndOfDay {
    time {
      currentDate
      currentTime
      nextEndOfDayAt
      timezone
      endOfDayTime
      canAdvanceToNextEndOfDay
    }
  }
}
