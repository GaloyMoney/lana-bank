mutation UserCreate($input: UserCreateInput!) {
  userCreate(input: $input) {
    user {
      userId
      email
      role {
        roleId
        name
      }
    }
  }
}

mutation UserUpdateRole($input: UserUpdateRoleInput!) {
  userUpdateRole(input: $input) {
    user {
      userId
      email
      role {
        roleId
        name
      }
    }
  }
}
