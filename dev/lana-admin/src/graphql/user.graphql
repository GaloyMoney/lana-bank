mutation UserCreate($input: UserCreateInput!) {
  userCreate(input: $input) {
    user {
      userId
      email
      role {
        roleId
        name
      }
    }
  }
}

mutation UserUpdateRole($input: UserRoleUpdateInput!) {
  userRoleUpdate(input: $input) {
    user {
      userId
      email
      role {
        roleId
        name
      }
    }
  }
}
