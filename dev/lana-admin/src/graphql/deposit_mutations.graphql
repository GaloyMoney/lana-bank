mutation DepositAccountCreate($input: DepositAccountCreateInput!) {
  depositAccountCreate(input: $input) {
    account {
      depositAccountId
      customerId
      publicId
      status
      createdAt
    }
  }
}

mutation DepositRecord($input: DepositRecordInput!) {
  depositRecord(input: $input) {
    deposit {
      depositId
      amount
      account {
        depositAccountId
        balance {
          settled
          pending
        }
      }
    }
  }
}

mutation WithdrawalInitiate($input: WithdrawalInitiateInput!) {
  withdrawalInitiate(input: $input) {
    withdrawal {
      withdrawalId
      accountId
      approvalProcessId
      amount
      status
      createdAt
      publicId
      reference
      account {
        status
        balance {
          settled
          pending
        }
      }
    }
  }
}

