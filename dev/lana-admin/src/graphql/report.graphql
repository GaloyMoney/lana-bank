query FindReportRun($id: UUID!) {
  reportRun(id: $id) {
    reportRunId
    state
    runType
    startTime
    reports {
      reportId
      name
      files {
        extension
      }
    }
  }
}

query ReportRunsList($first: Int!) {
  reportRuns(first: $first) {
    nodes {
      reportRunId
      state
      runType
      startTime
      reports {
        reportId
      }
    }
  }
}

mutation ReportFileDownloadLinkGenerate($input: ReportFileDownloadLinkGenerateInput!) {
  reportFileDownloadLinkGenerate(input: $input) {
    url
  }
}

mutation ReportRunTrigger($input: ReportRunTriggerInput!) {
  reportRunTrigger(input: $input) {
    reportRun {
      reportRunId
      state
      runType
      startTime
    }
  }
}
