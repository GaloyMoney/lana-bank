# Write your query or mutation here
query BalanceSheet($journalId: UUID!) {
  balanceSheet {
    byJournalId(journalId: $journalId) {
      assets {
        ...accountSet
      }
      liabilities {
        ...accountSet
      }
      equity {
        ...accountSet
      }
    }
  }
}

fragment accountSet on AccountSet {
  name
  normalBalanceType
  btcBalances: balance(currency: "BTC") {
    ...balancesByLayer
  }
  usdtBalances: balance(currency: "USDT") {
    ...balancesByLayer
  }
  usdBalances: balance(currency: "USD") {
    ...balancesByLayer
  }
  sets(first: 1000) {
    edges {
      node {
        name
      }
    }
  }
}

fragment balancesByLayer on Balance {
  settled {
    ...balances
  }
  pending {
    ...balances
  }
  encumbrance {
    ...balances
  }
}

fragment balances on BalanceAmount {
  normalBalance {
    units
    currency
  }
  drBalance {
    units
    currency
  }
  crBalance {
    units
    currency
  }
}
